<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS próprio -->
    <style>
        body {
            background-color: #f5f6fa;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: white;
            padding: 20px;
            border-right: 1px solid #ddd;
        }

        .sidebar a {
            display: block;
            padding: 10px;
            margin-bottom: 10px;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #f0f0f0;
        }

        .main {
            margin-left: 240px;
            padding: 20px;
        }

        .topbar {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-custom {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h4>📦 Sistema</h4>

        <a href="/">🏠 Início</a>
        <a href="/pedidos">📋 Pedidos</a>
        <a href="/clientes">👥 Clientes</a>
        <a href="/novo_pedido">➕ Registrar Pedido</a>
        <a href="/cadastrar_cliente">📝 Cadastrar Cliente</a>
        <a href="/relatorios">📄 Relatórios</a>
    </div>

    <!-- Conteúdo principal -->
    <div class="main">

        <!-- Topo -->
        <div class="topbar">
            <h5>{% block header %}Dashboard{% endblock %}</h5>
        </div>

        <!-- Conteúdo das páginas -->
        <div class="card-custom">
            {% block content %}
            {% endblock %}
        </div>

    </div>

</body>
</html>
